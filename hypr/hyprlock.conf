# hyprlock configuration — lock screen
# Docs: https://wiki.hypr.land/Hypr-Ecosystem/hyprlock/

general {
    hide_cursor = false
}

# --- Background ---
# Shows your wallpaper blurred behind the lock screen
background {
    monitor =
    path = ~/Pictures/wallpapers/enchanted-forest.jpg

    # Blur settings — higher passes = more blur
    blur_passes = 3
    blur_size = 6

    # Dim the wallpaper so the UI is easier to read
    brightness = 0.5
    contrast = 0.9
    vibrancy = 0.15
}

# --- Clock label ---
# Displays a large clock in the center of the screen
label {
    monitor =
    # cmd[update:1000] re-runs the command every 1000ms to keep the time live
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(205, 214, 244, 1.0)
    font_size = 72
    font_family = Noto Sans Mono

    position = 0, 120
    halign = center
    valign = center
}

# --- Date label ---
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d %B %Y")"
    color = rgba(166, 173, 200, 0.9)
    font_size = 18
    font_family = Noto Sans Mono

    position = 0, 40
    halign = center
    valign = center
}

# --- Password input field ---
input-field {
    monitor =
    size = 320, 50

    # Border styling
    outline_thickness = 2
    outer_color = rgb(49, 50, 68)
    inner_color = rgb(17, 17, 27)

    # Typing indicator dots
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true

    font_color = rgb(205, 214, 244)
    font_family = Noto Sans Mono

    placeholder_text = <i>Enter password...</i>
    hide_input = false
    fade_on_empty = false

    # Colors when checking / when wrong password
    check_color = rgb(137, 180, 250)
    fail_color = rgb(243, 139, 168)
    fail_text = <i>Wrong password ($ATTEMPTS attempts)</i>
    fail_timeout = 2000

    position = 0, -60
    halign = center
    valign = center
}
