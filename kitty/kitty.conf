cursor_shape block
cursor_opacity 0.7
cursor_beam_thickness 2.5

enable_kitty_keyboard_protocol yes
confirm_os_window_close 0


# BEGIN_KITTY_THEME
# Gruvbox Dark
include current-theme.conf
# END_KITTY_THEME
# Smooth-ish scrollback: SUPER+PgUp/PgDn scroll 3 lines per press.
# `combine` chains several one-line scrolls, so a tap nudges and holding the
# key (autorepeat) glides continuously. kitty has no animated scroll; this is
# the closest feel. Plain PgUp/PgDn stay free for less/vim/htop/Claude Code.
map super+page_up   combine : scroll_line_up   : scroll_line_up   : scroll_line_up
map super+page_down combine : scroll_line_down : scroll_line_down : scroll_line_down
